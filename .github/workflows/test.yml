name: Tests

on: [push, pull_request]

env:
  FORCE_COLOR: 2

jobs:
  run:
    name: Node.js ${{ matrix.node }} @ ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        node: [12, 14, 16, 18, 20, 21]
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
      - name: Clone repository
        uses: actions/checkout@v2

      - name: Setup Node.js (macOS legacy via x64 tarball)
        if: runner.os == 'macOS' && (matrix.node == 12 || matrix.node == 14)
        run: |
          case "${{ matrix.node }}" in
            12) NODE_VERSION="v12.22.12" ;;
            14) NODE_VERSION="v14.21.3" ;;
          esac
          curl -fsSLO "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-darwin-x64.tar.gz"
          sudo tar -xzf "node-${NODE_VERSION}-darwin-x64.tar.gz" -C /usr/local --strip-components=1
          rm "node-${NODE_VERSION}-darwin-x64.tar.gz"
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          /usr/local/bin/node --version
          /usr/local/bin/npm --version

      - name: Setup Node.js
        if: ${{ !(runner.os == 'macOS' && (matrix.node == 12 || matrix.node == 14)) }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node }}

      - name: Install npm dependencies
        run: npm install

      - name: Run tests
        run: npm run test:ci

      - name: Run Coveralls
        # `master` should be a tag but they don't have one
        uses: coverallsapp/github-action@master
        if: startsWith(matrix.os, 'ubuntu') && matrix.node == 14
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
